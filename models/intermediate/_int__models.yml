version: 2

models:
  - name: int_orders_enriched
    description: >
      Orders joined with customer, nation, and region context. Serves as the
      upstream dependency for fct_orders and fct_order_items. Modifying the
      customer geography logic here will cascade a state-aware rebuild to both
      downstream mart models.
    columns:
      - name: order_key
        description: Primary key (from orders).
        tests:
          - unique
          - not_null
      - name: customer_key
        description: Foreign key to customers.
        tests:
          - not_null
      - name: order_date
        tests:
          - not_null
      - name: sales_region
        description: Internal go-to-market region from the nation_region_overrides seed.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['NORTH AMERICA', 'LATAM', 'EMEA', 'APAC']

  - name: int_line_items_enriched
    description: >
      Line items joined with part and supplier detail. Pre-calculates
      discounted_price and net_price to keep revenue logic in one place.
      Changes to these formulas will cascade to fct_order_items and
      agg_revenue_by_nation in a state-aware run.
    columns:
      - name: order_key
        description: Foreign key to orders.
        tests:
          - not_null
      - name: line_number
        description: Line number within the order.
        tests:
          - not_null
      - name: discounted_price
        description: extended_price * (1 - discount_percentage).
      - name: net_price
        description: discounted_price * (1 + tax_rate).
